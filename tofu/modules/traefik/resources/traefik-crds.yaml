#
# Traefik CRDs
#
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: traefik-crds
  namespace: flux-system
spec:
  interval: 5m0s
  url: https://github.com/traefik/traefik-helm-chart
  ref:
    tag: v40.3.0
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-traefik-crds-apply
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: traefik-crds
  serviceAccountName: kustomize-controller
  path: ./traefik/crds
  prune: true
  wait: true
