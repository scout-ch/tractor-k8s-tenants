on:
  push:
    branches:
      - main

name: Plan and Apply
concurrency: tf-statelock

jobs:
  plan:
    name: "Prepare Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tofu
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Plan
        id: plan
        uses: ./.github/actions/common-plan
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          INFOMANIAK_TOKEN: ${{ secrets.INFOMANIAK_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Annotate Run
        if: success() || failure()
        shell: bash
        run: cat pretty_plan.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tfplan
          path: tofu/tfplan
  apply:
    name: "Apply Plan"
    runs-on: ubuntu-latest
    needs: plan
    environment: tractor-k8s-shared
    defaults:
      run:
        working-directory: tofu
    env:
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      INFOMANIAK_TOKEN: ${{ secrets.INFOMANIAK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
        with:
          tofu_version: 1.10.7

      - uses: de-vri-es/setup-git-credentials@5e1f18da68b7039c7f824408d170811aaec93ca8 # v2
        with:
          credentials: "https://${{ env.GITHU_TOKEN }}@github.com"

      - name: OpenTofu Init
        id: init
        run: tofu init

      - name: Download Plan Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: tfplan
          path: tofu

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: OpenTofu Apply
        id: apply
        run: tofu apply -auto-approve tfplan
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          INFOMANIAK_TOKEN: ${{ secrets.INFOMANIAK_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
