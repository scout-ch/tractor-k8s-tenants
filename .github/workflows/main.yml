on:
  push:
    branches:
      - main

name: Plan and Apply
concurrency: tf-statelock

jobs:
  plan:
    name: "Prepare Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tofu
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Plan
        id: plan
        uses: ./.github/actions/common-plan
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          INFOMANIAK_TOKEN: ${{ secrets.INFOMANIAK_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Annotate Run
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PLAN: ${{ steps.plan.outputs.plan }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 1. Prepare format of the comment
            const output = `#### OpenTofu Initialization ⚙️\`${{ steps.plan.outputs.init_outcome }}\`
            #### OpenTofu Validation 🤖\`${{ steps.plan.outputs.validate_outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`\n
            ${{ steps.plan.outputs.validate }}
            \`\`\`

            </details>

            #### OpenTofu Plan 📖\`${{ steps.plan.outputs.plan_outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`tofu\`, Workflow: \`${{ github.workflow }}\`*`;

            // 2. Write to step summary
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, output);

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: tfplan
          path: tofu/tfplan
  apply:
    name: "Apply Plan"
    runs-on: ubuntu-latest
    needs: plan
    environment: tractor-k8s-shared
    defaults:
      run:
        working-directory: tofu
    env:
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      INFOMANIAK_TOKEN: ${{ secrets.INFOMANIAK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: 1.10.7

      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: "https://${{ env.GITHU_TOKEN }}@github.com"

      - name: OpenTofu Init
        id: init
        run: tofu init

      - name: Download Plan Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: tfplan
          path: tofu

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: OpenTofu Apply
        id: apply
        run: tofu apply -auto-approve tfplan
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          INFOMANIAK_TOKEN: ${{ secrets.INFOMANIAK_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
